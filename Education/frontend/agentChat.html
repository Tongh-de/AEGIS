<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小 e 做题 Agent - 智能学习助手</title>
    <link rel="icon" type="image/x-icon" href="/education/static/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 设置栏 */
        .settings-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e1e5e9;
            align-items: center;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .setting-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .setting-item input[type="text"] {
            padding: 8px 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            width: 150px;
            transition: border-color 0.3s ease;
        }

        .setting-item input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 聊天区域 */
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 30px;
            background: #fafbfc;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: messageSlideIn 0.3s ease;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 12px;
        }

        .message.user .message-avatar {
            background: #e1e5e9;
            margin-left: 12px;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
            font-size: 15px;
        }

        .message.ai .message-content {
            background: white;
            border: 1px solid #e1e5e9;
            border-top-left-radius: 5px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-top-right-radius: 5px;
        }

        /* 思考过程 */
        .thinking-block {
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #e65100;
        }

        .thinking-title {
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 欢迎区域 */
        .welcome-section {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-section h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .welcome-section p {
            color: #666;
            margin-bottom: 25px;
        }

        /* 意图标签 */
        .intent-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .intent-tag {
            padding: 10px 20px;
            background: white;
            border: 2px solid #e1e5e9;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .intent-tag:hover {
            border-color: #667eea;
            background: #f7f9ff;
            transform: translateY(-2px);
        }

        /* 输入区域 */
        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e1e5e9;
            display: flex;
            gap: 12px;
        }

        .input-area textarea {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 60px;
            max-height: 150px;
            transition: border-color 0.3s ease;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            padding: 0 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 加载状态 */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 40%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            20% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                min-height: 100vh;
            }

            .header h1 {
                font-size: 22px;
            }

            .settings-bar {
                padding: 12px 20px;
                flex-direction: column;
                align-items: flex-start;
            }

            .chat-container {
                height: calc(100vh - 250px);
                padding: 20px;
            }

            .message-content {
                max-width: 85%;
            }

            .input-area {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🤖 小 e 做题 Agent</h1>
            <p>你的智能学习助手 - 出题、判题、解析一站式服务</p>
        </div>

        <!-- 设置栏 -->
        <div class="settings-bar">
            <div class="setting-item">
                <input type="checkbox" id="streamToggle" checked>
                <label for="streamToggle">流式输出</label>
            </div>
            <div class="setting-item">
                <input type="checkbox" id="thinkingToggle">
                <label for="thinkingToggle">思考模式</label>
            </div>
            <div class="setting-item">
                <label for="userIdInput">用户 ID:</label>
                <input type="text" id="userIdInput" placeholder="student_001" value="student_001">
            </div>
            <div class="setting-item">
                <label for="sessionIdInput">会话 ID:</label>
                <input type="text" id="sessionIdInput" placeholder="可选">
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="welcome-section">
                <h2>👋 你好！我是小 e</h2>
                <p>我可以帮助你出题、判题、解析题目，也可以聊聊学习方法</p>

                <div class="intent-tags">
                    <span class="intent-tag" onclick="useTemplate('帮我出一道初中数学的简单题')">📝 出题</span>
                    <span class="intent-tag" onclick="useTemplate('这道题怎么做？')">❓ 解析</span>
                    <span class="intent-tag" onclick="useTemplate('我选 A，帮我看看对不对')">✏️ 判题</span>
                    <span class="intent-tag" onclick="useTemplate('我想学习数学，有什么好方法？')">💡 学习指导</span>
                    <span class="intent-tag" onclick="useTemplate('推荐一些练习题给我')">📚 推荐题目</span>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <textarea id="messageInput" placeholder="输入你的问题..." rows="1" onkeypress="handleKeyPress(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE_URL = window.location.origin;
        const CHAT_API = '/edu/agent/chat';

        // 状态
        let isProcessing = false;
        let messages = [];

        // 使用模板
        function useTemplate(text) {
            document.getElementById('messageInput').value = text;
            document.getElementById('messageInput').focus();
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 添加消息到聊天
        function addMessage(content, isUser = false, isThinking = false) {
            const container = document.getElementById('chatContainer');
            const welcomeSection = container.querySelector('.welcome-section');
            if (welcomeSection) {
                welcomeSection.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;

            if (isThinking) {
                messageDiv.innerHTML = `
                    <div class="message-avatar">🤔</div>
                    <div class="message-content">
                        <div class="thinking-block">
                            <div class="thinking-title">💭 思考过程</div>
                            <div class="thinking-content">${content}</div>
                        </div>
                    </div>
                `;
            } else if (isUser) {
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">${escapeHtml(content)}</div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">${content}</div>
                `;
            }

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            return messageDiv;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示加载状态
        function showLoading() {
            const container = document.getElementById('chatContainer');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 隐藏加载状态
        function hideLoading() {
            const loadingDiv = document.getElementById('loadingMessage');
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        // 发送消息
        async function sendMessage() {
            if (isProcessing) return;

            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            const userId = document.getElementById('userIdInput').value.trim() || 'anonymous';
            const sessionId = document.getElementById('sessionIdInput').value.trim() || '';
            const isStream = document.getElementById('streamToggle').checked;
            const isThinking = document.getElementById('thinkingToggle').checked;

            // 添加用户消息
            addMessage(message, true);
            input.value = '';

            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;
            showLoading();

            try {
                const payload = {
                    question: message,
                    user_id: userId,
                    session_id: sessionId || undefined,
                    is_stream: isStream,
                    is_thinking: isThinking,
                    current_question_id: null,
                    current_question_text: null
                };

                if (isStream) {
                    await sendStreamRequest(payload);
                } else {
                    await sendNonStreamRequest(payload);
                }
            } catch (error) {
                console.error('Error:', error);
                hideLoading();
                addMessage(`❌ 请求失败：${error.message}`, false);
            } finally {
                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // 非流式请求
        async function sendNonStreamRequest(payload) {
            const response = await fetch(CHAT_API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            hideLoading();

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            if (data.status_code === 200) {
                const answer = data.data?.answer || '没有回答';
                addMessage(formatContent(answer), false);
            } else {
                throw new Error(data.msg || '请求失败');
            }
        }

        // 流式请求
        async function sendStreamRequest(payload) {
            const response = await fetch(CHAT_API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                hideLoading();
                throw new Error(`HTTP ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            let thinkingContent = '';
            let answerContent = '';
            let thinkingDiv = null;
            let answerDiv = null;

            hideLoading();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));

                            if (data.type === 'reasoning') {
                                // 思考过程
                                if (!thinkingDiv) {
                                    thinkingDiv = addMessage(data.content, false, true);
                                } else {
                                    const content = thinkingDiv.querySelector('.thinking-content');
                                    content.textContent += data.content;
                                }
                            } else if (data.type === 'content') {
                                // 回答内容
                                if (!answerDiv) {
                                    answerDiv = addMessage('', false);
                                }
                                answerContent += data.content;
                                answerDiv.querySelector('.message-content').innerHTML = formatContent(answerContent);
                            }
                        } catch (e) {
                            console.log('Parse error:', e);
                        }
                    }
                }
            }

            // 如果没有内容，显示提示
            if (!thinkingContent && !answerContent) {
                addMessage('暂无回复', false);
            }
        }

        // 格式化内容（支持简单的 Markdown）
        function formatContent(text) {
            if (!text) return '';

            // 转义 HTML
            let formatted = escapeHtml(text);

            // 加粗
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // 斜体
            formatted = formatted.replace(/\*(.*?)\*/g, '<em>$1</em>');

            // 列表
            formatted = formatted.replace(/^- (.*?)(?=\n|$)/gm, '<li>$1</li>');
            formatted = formatted.replace(/(<li>.*<\/li>\n?)+/g, '<ul style="padding-left:20px;margin:10px0;">$&</ul>');

            // 换行
            formatted = formatted.replace(/\n/g, '<br>');

            return formatted;
        }

        // 自动调整输入框高度
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
