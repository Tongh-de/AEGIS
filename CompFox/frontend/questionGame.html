<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合规答题对战</title>
    <link rel="icon" type="image/x-icon" href="/compfox/static/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            font-size: 32px;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        /* 开始界面 */
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .start-btn {
            padding: 25px 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .start-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .start-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 游戏区域 */
        .game-screen {
            display: none;
            flex: 1;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            height: 100%;
        }

        /* 玩家区域 */
        .player-section {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
            flex-shrink: 0;
        }

        .player-title {
            font-size: 18px;
            font-weight: 600;
        }

        .player-stats {
            font-size: 13px;
        }

        /* 题目卡片 */
        .question-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 2px solid #e1e5e9;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .question-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .tag {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .tag.subject {
            background: #e7f3ff;
            color: #0056b3;
        }

        .tag.type {
            background: #fff3e0;
            color: #e65100;
        }

        .tag.difficulty {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .question-text {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .question-number {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
            flex-shrink: 0;
        }

        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .option {
            padding: 10px 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            font-size: 13px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f7f9ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #e7f3ff;
            color: #0056b3;
        }

        .option input[type="checkbox"],
        .option input[type="radio"] {
            margin-right: 10px;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        /* 输入框 */
        .answer-input input[type="text"],
        .answer-input textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            flex-shrink: 0;
        }

        .answer-input textarea {
            min-height: 80px;
        }

        .answer-input input:focus,
        .answer-input textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 判断题 */
        .judge-options {
            display: flex;
            gap: 12px;
        }

        .judge-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
        }

        .judge-btn:hover {
            border-color: #667eea;
            background: #f7f9ff;
        }

        .judge-btn.selected {
            border-color: #667eea;
            background: #e7f3ff;
            color: #0056b3;
        }

        /* 答案按钮 */
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            flex-shrink: 0;
            margin-top: 15px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 进度显示 */
        .progress-section {
            background: #d4edda;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-around;
            flex-shrink: 0;
        }

        .progress-item {
            text-align: center;
        }

        .progress-label {
            font-size: 11px;
            color: #155724;
            margin-bottom: 4px;
        }

        .progress-value {
            font-size: 18px;
            font-weight: bold;
            color: #155724;
        }

        .progress-value.wrong {
            color: #dc3545;
        }

        /* 结果显示 */
        .result-feedback {
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
            flex-shrink: 0;
        }

        .result-feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result-feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* 加载状态 */
        .loading {
            display: block;
            text-align: center;
            color: white;
            width: 100%;
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 30px;
        }

        .loading-animation {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 100%;
            height: 100%;
            animation: spin 1s linear infinite;
        }

        .loading-dots {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 6px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .loading-text {
            font-size: 20px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.5s ease;
            min-height: 30px;
        }

        .loading-text.fade-out {
            animation: fadeOut 0.3s ease forwards;
        }

        .loading-text.fade-in {
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        /* Modal 弹窗 */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            width: 600px;
            max-width: 90%;
            margin: 10vh auto;
            padding: 40px;
            border-radius: 20px;
            animation: modalShow 0.3s ease;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #667eea;
        }

        .winner-section {
            padding: 30px;
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            border-radius: 15px;
            margin: 20px 0;
            color: white;
        }

        .winner-title {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .winner-name {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 20px;
            margin: 10px 0;
            line-height: 1.8;
        }

        .replay-btn {
            padding: 20px 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-top: 30px;
        }

        .replay-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        @keyframes modalShow {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">
            <img src="/compfox/static/wolin.jpg" alt="Logo" style="height: 60px; margin-right: 20px; vertical-align: middle;">
            🎮 合规答题对战
        </h1>

        <!-- 开始界面 -->
        <div class="start-screen" id="startScreen">
            <div class="loading-screen" id="loadingScreen" style="display: none;">
                <div class="loading-animation">
                    <div class="spinner"></div>
                    <div class="loading-dots">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
                <div class="loading-text" id="loadingText">正在准备...</div>
            </div>
            <button class="start-btn" id="startBtn" onclick="startGame()">
                🚀 开始对战
            </button>
        </div>

        <!-- 游戏界面 -->
        <div class="game-screen" id="gameScreen">
            <div class="game-container">
                <!-- 玩家1 -->
                <div class="player-section" id="player1Section">
                    <div class="player-header">
                        <span class="player-title">👤 玩家 1</span>
                        <span class="player-stats" id="player1Stats">进度: 0/10 | 正确: 0 | 错误: 0</span>
                    </div>

                    <div class="progress-section">
                        <div class="progress-item">
                            <div class="progress-label">正确</div>
                            <div class="progress-value" id="player1Correct">0</div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">错误</div>
                            <div class="progress-value wrong" id="player1Wrong">0</div>
                        </div>
                    </div>

                    <div class="question-card" id="player1Card">
                        <div class="question-number" id="player1QuestionNum">题目 1/10</div>
                        <div class="question-meta">
                            <span class="tag subject" id="player1Subject">合规领域</span>
                            <span class="tag type" id="player1Type">题型</span>
                            <span class="tag difficulty" id="player1Difficulty">难度</span>
                        </div>
                        <div class="question-text" id="player1QuestionText"></div>
                        <div id="player1AnswerArea"></div>
                        <button class="submit-btn" id="player1SubmitBtn" onclick="submitAnswer(1)">
                            ✓ 提交答案
                        </button>
                        <div class="result-feedback" id="player1Feedback"></div>
                    </div>
                </div>

                <!-- 玩家2 -->
                <div class="player-section" id="player2Section">
                    <div class="player-header">
                        <span class="player-title">👤 玩家 2</span>
                        <span class="player-stats" id="player2Stats">进度: 0/10 | 正确: 0 | 错误: 0</span>
                    </div>

                    <div class="progress-section">
                        <div class="progress-item">
                            <div class="progress-label">正确</div>
                            <div class="progress-value" id="player2Correct">0</div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">错误</div>
                            <div class="progress-value wrong" id="player2Wrong">0</div>
                        </div>
                    </div>

                    <div class="question-card" id="player2Card">
                        <div class="question-number" id="player2QuestionNum">题目 1/10</div>
                        <div class="question-meta">
                            <span class="tag subject" id="player2Subject">合规领域</span>
                            <span class="tag type" id="player2Type">题型</span>
                            <span class="tag difficulty" id="player2Difficulty">难度</span>
                        </div>
                        <div class="question-text" id="player2QuestionText"></div>
                        <div id="player2AnswerArea"></div>
                        <button class="submit-btn" id="player2SubmitBtn" onclick="submitAnswer(2)">
                            ✓ 提交答案
                        </button>
                        <div class="result-feedback" id="player2Feedback"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div id="resultModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">🏆 对战结果</div>
            <div class="winner-section">
                <div class="winner-title">恭喜优胜者</div>
                <div class="winner-name" id="winnerName">玩家 1</div>
                <div class="final-score" id="finalScore"></div>
            </div>
            <button class="replay-btn" onclick="restartGame()">
                🔄 再次对战
            </button>
        </div>
    </div>

    <script>
        // 游戏状态
        let questions = [];
        let player1Questions = [];
        let player2Questions = [];
        let player1State = {
            currentQuestionIndex: 0,
            correctCount: 0,
            wrongCount: 0,
            answers: [],
            finished: false
        };
        let player2State = {
            currentQuestionIndex: 0,
            correctCount: 0,
            wrongCount: 0,
            answers: [],
            finished: false
        };

        // 题型映射
        const questionTypeMap = {
            'single_choice': '单选题',
            'multiple_choice': '多选题',
            'fill_blank': '填空题',
            'short_answer': '简答题',
            'essay': '论述题',
            'judgement': '判断题'
        };

        // 难度映射
        const difficultyMap = {
            1: '简单',
            2: '较简单',
            3: '中等',
            4: '较困难',
            5: '困难'
        };

        // Fisher-Yates 洗牌算法
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 延迟显示文本
        function delayText(element, text, duration) {
            return new Promise(resolve => {
                element.textContent = text;
                element.classList.remove('fade-out');
                element.classList.add('fade-in');
                setTimeout(resolve, duration);
            });
        }

        // 开始游戏
        async function startGame() {
            // 先显示加载状态，隐藏开始按钮
            document.getElementById('startBtn').style.display = 'none';
            const loadingScreen = document.getElementById('loadingScreen');
            const loadingText = document.getElementById('loadingText');
            loadingScreen.style.display = 'flex';

            try {
                // 阶段1：随机抽取题目
                await delayText(loadingText, '🎲 正在随机抽取 10 道题目...', 1200);

                // 随机抽取10道题目
                const response = await fetch('/compfox/question/random_one?num=10');
                const data = await response.json();

                if (data.status_code === 200 && data.data) {
                    questions = data.data;

                    // 阶段2：打乱题目顺序
                    loadingText.classList.add('fade-out');
                    await new Promise(resolve => setTimeout(resolve, 300));
                    await delayText(loadingText, '🔀 正在打乱两位玩家题目的顺序...', 1000);

                    // 为两位玩家分别打乱题目顺序
                    player1Questions = shuffleArray(questions);
                    player2Questions = shuffleArray(questions);

                    // 阶段3：准备完成
                    loadingText.classList.add('fade-out');
                    await new Promise(resolve => setTimeout(resolve, 300));
                    await delayText(loadingText, '✅ 准备完成！', 500);

                    // 进入游戏界面
                    loadingScreen.style.display = 'none';
                    document.getElementById('startScreen').style.display = 'none';
                    document.getElementById('gameScreen').style.display = 'block';

                    // 显示第一题
                    displayQuestion(1);
                    displayQuestion(2);
                } else {
                    // 恢复开始按钮
                    loadingScreen.style.display = 'none';
                    document.getElementById('startBtn').style.display = 'block';
                    alert('获取题目失败，请刷新重试');
                }
            } catch (error) {
                console.error('Error:', error);
                // 恢复开始按钮
                loadingScreen.style.display = 'none';
                document.getElementById('startBtn').style.display = 'block';
                alert('网络错误，请检查网络连接');
            }
        }

        // 显示题目
        function displayQuestion(playerNum) {
            const state = playerNum === 1 ? player1State : player2State;
            const playerQuestions = playerNum === 1 ? player1Questions : player2Questions;
            const prefix = `player${playerNum}`;

            if (state.currentQuestionIndex >= playerQuestions.length) {
                return;
            }

            const question = playerQuestions[state.currentQuestionIndex];

            // 显示题目信息
            document.getElementById(`${prefix}QuestionNum`).textContent = `题目 ${state.currentQuestionIndex + 1}/10`;
            document.getElementById(`${prefix}Subject`).textContent = question.subject || '未知';
            document.getElementById(`${prefix}Type`).textContent = questionTypeMap[question.question_type] || '未知';
            document.getElementById(`${prefix}Difficulty`).textContent = difficultyMap[question.difficulty_level] || '未知';

            // 提取并显示题目内容
            const extracted = extractOptions(question.question_text);
            document.getElementById(`${prefix}QuestionText`).textContent = extracted.question;

            // 显示答案输入区
            const answerArea = document.getElementById(`${prefix}AnswerArea`);
            answerArea.innerHTML = '';

            if (question.question_type === 'single_choice') {
                displaySingleChoice(answerArea, extracted.options, prefix);
            } else if (question.question_type === 'multiple_choice') {
                displayMultipleChoice(answerArea, extracted.options, prefix);
            } else if (question.question_type === 'fill_blank') {
                displayFillBlank(answerArea, prefix);
            } else if (question.question_type === 'short_answer') {
                displayShortAnswer(answerArea, prefix);
            } else if (question.question_type === 'essay') {
                displayEssay(answerArea, prefix);
            } else if (question.question_type === 'judgement') {
                displayJudgement(answerArea, prefix);
            }

            // 清空反馈信息
            document.getElementById(`${prefix}Feedback`).style.display = 'none';
            document.getElementById(`${prefix}SubmitBtn`).disabled = false;

            // 如果已经回答过，禁用按钮
            if (state.answers[state.currentQuestionIndex]) {
                document.getElementById(`${prefix}SubmitBtn`).disabled = true;
            }
        }

        // 提取选项
        function extractOptions(questionText) {
            const options = {};
            const lines = questionText.split('\n');
            let contentLines = [];
            const optionPattern = /^([A-D])\.\s*(.+)$/;

            lines.forEach(line => {
                const match = line.match(optionPattern);
                if (match) {
                    options[match[1]] = match[2].trim();
                } else if (line.trim()) {
                    contentLines.push(line);
                }
            });

            return {
                question: contentLines.join('\n'),
                options: options
            };
        }

        // 单选题
        function displaySingleChoice(container, options, prefix) {
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            const optionLetters = Object.keys(options).length > 0 ? Object.keys(options) : ['A', 'B', 'C', 'D'];

            optionLetters.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `
                    <input type="radio" name="${prefix}_answer" value="${opt}">
                    <span>${opt}.</span>
                    <span style="flex: 1; margin-left: 8px;">${options[opt] || ''}</span>
                `;
                div.addEventListener('click', (e) => {
                    if (e.target.type !== 'radio') {
                        const radio = div.querySelector('input[type="radio"]');
                        radio.checked = true;
                        document.querySelectorAll(`#${prefix}AnswerArea .option`).forEach(o => o.classList.remove('selected'));
                        div.classList.add('selected');
                    }
                });
                optionsDiv.appendChild(div);
            });
            container.appendChild(optionsDiv);
        }

        // 多选题
        function displayMultipleChoice(container, options, prefix) {
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            const optionLetters = Object.keys(options).length > 0 ? Object.keys(options) : ['A', 'B', 'C', 'D', 'E', 'F'];

            optionLetters.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `
                    <input type="checkbox" name="${prefix}_answer" value="${opt}">
                    <span>${opt}.</span>
                    <span style="flex: 1; margin-left: 8px;">${options[opt] || ''}</span>
                `;
                div.addEventListener('click', (e) => {
                    if (e.target.type !== 'checkbox') {
                        const checkbox = div.querySelector('input[type="checkbox"]');
                        checkbox.checked = !checkbox.checked;
                        div.classList.toggle('selected', checkbox.checked);
                    }
                });
                optionsDiv.appendChild(div);
            });
            container.appendChild(optionsDiv);
        }

        // 填空题
        function displayFillBlank(container, prefix) {
            const div = document.createElement('div');
            div.className = 'answer-input';
            div.innerHTML = `<input type="text" id="${prefix}_fillBlank" placeholder="请输入答案">`;
            container.appendChild(div);
        }

        // 简答题
        function displayShortAnswer(container, prefix) {
            const div = document.createElement('div');
            div.className = 'answer-input';
            div.innerHTML = `<textarea id="${prefix}_shortAnswer" placeholder="请输入答案（200字以内）" maxlength="200"></textarea>`;
            container.appendChild(div);
        }

        // 论述题
        function displayEssay(container, prefix) {
            const div = document.createElement('div');
            div.className = 'answer-input';
            div.innerHTML = `<textarea id="${prefix}_essay" placeholder="请输入答案" style="min-height: 150px;"></textarea>`;
            container.appendChild(div);
        }

        // 判断题
        function displayJudgement(container, prefix) {
            const div = document.createElement('div');
            div.className = 'judge-options';
            div.innerHTML = `
                <div class="judge-btn" data-value="true" onclick="selectJudgement(this, '${prefix}')">正确</div>
                <div class="judge-btn" data-value="false" onclick="selectJudgement(this, '${prefix}')">错误</div>
            `;
            container.appendChild(div);
        }

        // 选择判断题答案
        function selectJudgement(element, prefix) {
            document.querySelectorAll(`#${prefix}AnswerArea .judge-btn`).forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
        }

        // 收集答案
        function collectAnswer(playerNum, question) {
            const prefix = `player${playerNum}`;
            const type = question.question_type;

            if (type === 'single_choice') {
                const selected = document.querySelector(`input[name="${prefix}_answer"]:checked`);
                return selected ? selected.value : null;
            }

            if (type === 'multiple_choice') {
                const selected = document.querySelectorAll(`input[name="${prefix}_answer"]:checked`);
                if (selected.length === 0) return null;
                const answers = [];
                selected.forEach(checkbox => answers.push(checkbox.value));
                return answers.join(',');
            }

            if (type === 'fill_blank') {
                return document.getElementById(`${prefix}_fillBlank`).value;
            }

            if (type === 'short_answer') {
                return document.getElementById(`${prefix}_shortAnswer`).value;
            }

            if (type === 'essay') {
                return document.getElementById(`${prefix}_essay`).value;
            }

            if (type === 'judgement') {
                const selected = document.querySelector(`#${prefix}AnswerArea .judge-btn.selected`);
                return selected ? selected.dataset.value : null;
            }

            return null;
        }

        // 提交答案
        async function submitAnswer(playerNum) {
            const state = playerNum === 1 ? player1State : player2State;
            const playerQuestions = playerNum === 1 ? player1Questions : player2Questions;
            const prefix = `player${playerNum}`;

            // 检查是否已经回答过
            if (state.answers[state.currentQuestionIndex]) {
                return;
            }

            const question = playerQuestions[state.currentQuestionIndex];
            const userAnswer = collectAnswer(playerNum, question);

            if (!userAnswer) {
                alert('请先填写答案');
                return;
            }

            // 禁用提交按钮
            document.getElementById(`${prefix}SubmitBtn`).disabled = true;

            try {
                // 使用人工判题接口
                const response = await fetch('/compfox/question/judge', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question_id: question.id,
                        answer: userAnswer,
                        source: 'game',
                        user_id: `player${playerNum}`
                    })
                });

                const data = await response.json();

                if (data.status_code === 200) {
                    // 记录答案和结果
                    state.answers[state.currentQuestionIndex] = {
                        question: question,
                        answer: userAnswer,
                        result: data.data
                    };

                    // 更新统计
                    if (data.data.score === 1) {
                        state.correctCount++;
                    } else {
                        state.wrongCount++;
                    }

                    updateStats(playerNum);

                    // 显示反馈
                    showFeedback(playerNum, data.data);

                    // 进入下一题
                    state.currentQuestionIndex++;

                    // 检查是否完成10题
                    if (state.currentQuestionIndex >= 10) {
                        state.finished = true;
                        checkGameEnd();
                    } else {
                        // 延迟显示下一题
                        setTimeout(() => {
                            displayQuestion(playerNum);
                        }, 1000);
                    }

                    // 如果游戏已结束（另一个玩家还没完成），禁用对方的答题区域
                    if (player1State.finished || player2State.finished) {
                        const otherPlayerNum = playerNum === 1 ? 2 : 1;
                        disablePlayer(otherPlayerNum);
                    }
                } else {
                    alert('判题失败：' + (data.msg || '未知错误'));
                    document.getElementById(`${prefix}SubmitBtn`).disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('网络错误，请检查网络连接');
                document.getElementById(`${prefix}SubmitBtn`).disabled = false;
            }
        }

        // 更新统计信息
        function updateStats(playerNum) {
            const state = playerNum === 1 ? player1State : player2State;
            const prefix = `player${playerNum}`;

            const statsText = `进度: ${state.currentQuestionIndex}/10 | 正确: ${state.correctCount} | 错误: ${state.wrongCount}`;
            document.getElementById(`${prefix}Stats`).textContent = statsText;
            document.getElementById(`${prefix}Correct`).textContent = state.correctCount;
            document.getElementById(`${prefix}Wrong`).textContent = state.wrongCount;
        }

        // 显示反馈
        function showFeedback(playerNum, result) {
            const prefix = `player${playerNum}`;
            const feedback = document.getElementById(`${prefix}Feedback`);

            feedback.className = 'result-feedback ' + (result.score === 1 ? 'correct' : 'wrong');
            feedback.innerHTML = `
                <div style="font-weight: bold; margin-bottom: 10px;">
                    ${result.score === 1 ? '✓ 回答正确' : '✗ 回答错误'}
                </div>
                <div style="font-size: 14px;">${result.ai_result}</div>
            `;
            feedback.style.display = 'block';
        }

        // 禁用玩家答题区域
        function disablePlayer(playerNum) {
            const prefix = `player${playerNum}`;
            const submitBtn = document.getElementById(`${prefix}SubmitBtn`);
            const questionCard = document.getElementById(`${prefix}Card`);

            if (submitBtn) {
                submitBtn.disabled = true;
            }

            // 禁用所有输入控件
            const inputs = questionCard.querySelectorAll('input, textarea, .option, .judge-btn');
            inputs.forEach(input => {
                if (input.tagName === 'INPUT' || input.tagName === 'TEXTAREA') {
                    input.disabled = true;
                } else {
                    input.style.pointerEvents = 'none';
                    input.style.opacity = '0.5';
                }
            });

            // 显示提示信息
            const feedback = document.getElementById(`${prefix}Feedback`);
            feedback.className = 'result-feedback wrong';
            feedback.innerHTML = `
                <div style="font-weight: bold; margin-bottom: 10px;">
                    ⚠️ 游戏结束
                </div>
                <div style="font-size: 14px;">对方已抢先完成所有题目！</div>
            `;
            feedback.style.display = 'block';
        }

        // 检查游戏是否结束
        function checkGameEnd() {
            // 只要有一个玩家完成，就立即结算
            if (player1State.finished || player2State.finished) {
                setTimeout(showFinalResult, 500);
            }
        }

        // 显示最终结果
        function showFinalResult() {
            const p1Score = player1State.correctCount;
            const p2Score = player2State.correctCount;
            const p1Finished = player1State.finished;
            const p2Finished = player2State.finished;

            let winnerName, winnerText;

            if (p1Score > p2Score) {
                winnerName = '👤 玩家 1';
                winnerText = '以绝对优势获胜！';
            } else if (p2Score > p1Score) {
                winnerName = '👤 玩家 2';
                winnerText = '以绝对优势获胜！';
            } else {
                // 如果分数相同，先完成的人获胜
                winnerName = p1Finished && p1State.currentQuestionIndex >= 10 ? '👤 玩家 1' : '👤 玩家 2';
                winnerText = '先完成者获胜！';
            }

            const scoreHtml = `
                <div>玩家 1：正确 ${p1Score} 题，错误 ${player1State.wrongCount} 题 ${p1Finished ? '✅ 已完成' : '⏳ 未完成'}</div>
                <div>玩家 2：正确 ${p2Score} 题，错误 ${player2State.wrongCount} 题 ${p2Finished ? '✅ 已完成' : '⏳ 未完成'}</div>
            `;

            document.getElementById('winnerName').textContent = winnerName;
            document.getElementById('finalScore').innerHTML = scoreHtml + `<div style="margin-top: 20px; font-size: 18px;">${winnerText}</div>`;
            document.getElementById('resultModal').style.display = 'block';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        // 重新开始游戏
        function restartGame() {
            closeModal();

            // 隐藏游戏界面，显示开始界面
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';

            // 重置状态
            player1State = {
                currentQuestionIndex: 0,
                correctCount: 0,
                wrongCount: 0,
                answers: [],
                finished: false
            };
            player2State = {
                currentQuestionIndex: 0,
                correctCount: 0,
                wrongCount: 0,
                answers: [],
                finished: false
            };

            // 更新界面
            updateStats(1);
            updateStats(2);

            // 重置开始按钮为可见
            document.getElementById('startBtn').style.display = 'block';

            // 重新开始
            startGame();
        }
    </script>
</body>
</html>
